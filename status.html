<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Requests - 2026 XXX Consulting All-Developer YYY ZZZ-a-thon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header-bar">
                <h1>📊 My Request Status</h1>
                <div class="header-actions">
                    <a href="form.html" class="btn btn-small">New Request</a>
                    <button class="btn btn-outline" onclick="logout()">Logout</button>
                </div>
            </div>
            <h3>2026 XXX Consulting All-Developer YYY ZZZ-a-thon</h3>
            <hr>

            <!-- Requests Table -->
            <div class="table-wrapper">
                <table id="statusTable">
                    <thead>
                        <tr>
                            <th>Team Name</th>
                            <th>Submitted</th>
                            <th>Status</th>
                            <th>Admin Comments</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody id="statusBody">
                    </tbody>
                </table>
            </div>

            <div id="noRequests" style="display:none; text-align:center; padding:40px;">
                <p>You have not submitted any requests yet.</p>
                <a href="form.html" class="btn btn-primary">Submit a Request</a>
            </div>
        </div>

        <!-- Detail Modal -->
        <div id="statusModal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="modal-close" onclick="closeStatusModal()">&times;</span>
                <h2>Request Details</h2>
                <div id="statusModalBody"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        // Check auth
        var currentUser = checkAuth();
        var userRequests = [];
        showConnectCSVBar();

        loadUserRequests();

        function loadUserRequests() {
            var allRequests = getRequests();
            userRequests = allRequests.filter(function(r) {
                return r.email === currentUser.email;
            });

            if (userRequests.length === 0) {
                document.getElementById('statusTable').style.display = 'none';
                document.getElementById('noRequests').style.display = 'block';
                return;
            }

            document.getElementById('statusTable').style.display = '';
            document.getElementById('noRequests').style.display = 'none';

            var tbody = document.getElementById('statusBody');
            tbody.innerHTML = '';

            userRequests.forEach(function(req) {
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td><strong>' + escapeHtml(req.teamName) + '</strong></td>' +
                    '<td>' + escapeHtml(req.submittedDate) + '</td>' +
                    '<td><span class="status-badge status-' + req.status.toLowerCase().replace(' ', '-') + '">' + escapeHtml(req.status) + '</span></td>' +
                    '<td>' + escapeHtml(req.adminComments || '-') + '</td>' +
                    '<td><button class="btn btn-view" onclick="viewRequestDetail(\'' + req.id + '\')">View</button></td>';
                tbody.appendChild(tr);
            });
        }

        function viewRequestDetail(id) {
            var req = userRequests.find(function(r) { return r.id === id; });
            if (!req) return;

            var body = document.getElementById('statusModalBody');
            body.innerHTML =
                '<p><strong>Team Name:</strong> ' + escapeHtml(req.teamName) + '</p>' +
                '<p><strong>Email:</strong> ' + escapeHtml(req.email) + '</p>' +
                '<p><strong>Submitted:</strong> ' + escapeHtml(req.submittedDate) + '</p>' +
                '<p><strong>Status:</strong> <span class="status-badge status-' + req.status.toLowerCase().replace(' ', '-') + '">' + escapeHtml(req.status) + '</span></p>' +
                '<hr>' +
                '<p><strong>Description:</strong></p><p class="detail-text">' + escapeHtml(req.description) + '</p>' +
                '<p><strong>Justification:</strong></p><p class="detail-text">' + escapeHtml(req.justification) + '</p>' +
                '<hr>' +
                '<h3>Approval / Audit Trail</h3>' +
                '<p><strong>Approval Status:</strong> ' + escapeHtml(req.status) + '</p>' +
                '<p><strong>Admin Comments:</strong> ' + escapeHtml(req.adminComments || 'No comments yet') + '</p>';

            document.getElementById('statusModal').style.display = 'flex';
        }

        function closeStatusModal() {
            document.getElementById('statusModal').style.display = 'none';
        }
    </script>
</body>
</html>
