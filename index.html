<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - 2026 XXX Consulting All-Developer YYY ZZZ-a-thon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card login-card">
            <h1>📊 2026 XXX Consulting All-Developer YYY ZZZ-a-thon</h1>
            <h3>Request for access to deployment environment<br>Pro-code Solution Pattern Option B</h3>
            <hr>
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
            <p class="register-link">Don't have an account? <a href="#" id="showRegister">Register here</a></p>

            <!-- Register Form (hidden by default) -->
            <div id="registerSection" style="display:none;">
                <hr>
                <h2>Register</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label for="regConfirmPassword">Confirm Password</label>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="btn btn-secondary">Register</button>
                </form>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        // Initialize default admin user
        initData();

        document.getElementById('showRegister').addEventListener('click', function(e) {
            e.preventDefault();
            var section = document.getElementById('registerSection');
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            var users = getUsers();
            var user = users.find(function(u) {
                return u.email === email && u.password === password;
            });

            if (user) {
                sessionStorage.setItem('loggedInUser', JSON.stringify(user));
                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'form.html';
                }
            } else {
                showMessage('Invalid email or password', 'error');
            }
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('regEmail').value.trim();
            var password = document.getElementById('regPassword').value;
            var confirmPassword = document.getElementById('regConfirmPassword').value;

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            var users = getUsers();
            var exists = users.find(function(u) { return u.email === email; });
            if (exists) {
                showMessage('User already exists', 'error');
                return;
            }

            users.push({ email: email, password: password, role: 'user' });
            saveUsers(users);
            showMessage('Registration successful! You can now login.', 'success');
            document.getElementById('registerForm').reset();
        });

        function showMessage(text, type) {
            var msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = 'message ' + type;
            setTimeout(function() { msgDiv.textContent = ''; msgDiv.className = 'message'; }, 3000);
        }
    </script>
</body>
</html>
