<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - 2026 XXX Consulting All-Developer YYY ZZZ-a-thon</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="admin-body">
    <div class="container">
        <div class="card">
            <div class="header-bar">
                <h1>📊 Admin Dashboard</h1>
                <button class="btn btn-outline" onclick="logout()">Logout</button>
            </div>

            <!-- Stats Section -->
            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-icon">📝</span>
                    <span class="stat-number blue" id="totalCount">0</span>
                    <span class="stat-label">TOTAL SUBMISSIONS</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">⏳</span>
                    <span class="stat-number yellow" id="pendingCount">0</span>
                    <span class="stat-label">PENDING</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">✅</span>
                    <span class="stat-number green" id="approvedCount">0</span>
                    <span class="stat-label">APPROVED</span>
                </div>
                <div class="stat-card">
                    <span class="stat-icon">✖</span>
                    <span class="stat-number red" id="notApprovedCount">0</span>
                    <span class="stat-label">NOT APPROVED</span>
                </div>
            </div>

            <!-- Search & Filter -->
            <div class="filter-row">
                <input type="text" id="searchInput" placeholder="🔍 Search by team name or email..." class="search-input">
                <select id="statusFilter" class="status-filter">
                    <option value="All">All Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Not Approved">Not Approved</option>
                </select>
            </div>

            <!-- Download CSV Button -->
            <div style="margin-bottom: 15px;">
                <button class="btn btn-small" onclick="downloadCSV()">⬇ Download CSV</button>
            </div>

            <!-- Requests Table -->
            <div class="table-wrapper">
                <table id="requestsTable">
                    <thead>
                        <tr>
                            <th>Team Name</th>
                            <th>Email</th>
                            <th>Submitted</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="requestsBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Detail Modal -->
        <div id="detailModal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="modal-close" onclick="closeModal()">&times;</span>
                <h2>Request Details</h2>
                <div id="modalBody"></div>
                <hr>
                <h3>Approval / Audit Trail</h3>
                <div class="form-group">
                    <label for="modalStatus">Approval Status</label>
                    <select id="modalStatus">
                        <option value="Pending">Pending</option>
                        <option value="Approved">Approved</option>
                        <option value="Not Approved">Not Approved</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="modalComments">Approval / Not Approved Reason</label>
                    <textarea id="modalComments" rows="3" placeholder="Enter reason or comments..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveDecision()">Save Decision</button>
                <div id="modalMessage" class="message"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
        // Check admin auth
        var currentUser = checkAuth('admin');
        var currentRequestId = null;
        var allRequests = [];

        // Load data
        loadAdminDashboard();

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterAndRender);
        document.getElementById('statusFilter').addEventListener('change', filterAndRender);

        function loadAdminDashboard() {
            apiGet('/api/requests?role=admin', function(err, requests) {
                allRequests = requests || [];
                filterAndRender();
            });
        }

        function filterAndRender() {
            var search = document.getElementById('searchInput').value.toLowerCase();
            var statusFilter = document.getElementById('statusFilter').value;

            var filtered = allRequests.filter(function(r) {
                var matchesSearch = r.teamName.toLowerCase().indexOf(search) !== -1 ||
                                    r.email.toLowerCase().indexOf(search) !== -1;
                var matchesStatus = statusFilter === 'All' || r.status === statusFilter;
                return matchesSearch && matchesStatus;
            });

            // Update stats
            document.getElementById('totalCount').textContent = allRequests.length;
            document.getElementById('pendingCount').textContent = allRequests.filter(function(r) { return r.status === 'Pending'; }).length;
            document.getElementById('approvedCount').textContent = allRequests.filter(function(r) { return r.status === 'Approved'; }).length;
            document.getElementById('notApprovedCount').textContent = allRequests.filter(function(r) { return r.status === 'Not Approved'; }).length;

            // Render table
            var tbody = document.getElementById('requestsBody');
            tbody.innerHTML = '';

            filtered.forEach(function(req) {
                var tr = document.createElement('tr');
                tr.innerHTML =
                    '<td><strong>' + escapeHtml(req.teamName) + '</strong></td>' +
                    '<td>' + escapeHtml(req.email) + '</td>' +
                    '<td>' + escapeHtml(req.submittedDate) + '</td>' +
                    '<td><span class="status-badge status-' + req.status.toLowerCase().replace(' ', '-') + '">' + escapeHtml(req.status) + '</span></td>' +
                    '<td><button class="btn btn-view" onclick="viewDetails(\'' + req.id + '\')">View Details</button></td>';
                tbody.appendChild(tr);
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">No requests found</td></tr>';
            }
        }

        function viewDetails(id) {
            var req = allRequests.find(function(r) { return r.id === id; });
            if (!req) return;

            currentRequestId = id;
            var body = document.getElementById('modalBody');
            body.innerHTML =
                '<p><strong>Team Name:</strong> ' + escapeHtml(req.teamName) + '</p>' +
                '<p><strong>Email:</strong> ' + escapeHtml(req.email) + '</p>' +
                '<p><strong>Submitted:</strong> ' + escapeHtml(req.submittedDate) + '</p>' +
                '<p><strong>Description:</strong></p><p class="detail-text">' + escapeHtml(req.description) + '</p>' +
                '<p><strong>Justification:</strong></p><p class="detail-text">' + escapeHtml(req.justification) + '</p>';

            document.getElementById('modalStatus').value = req.status;
            document.getElementById('modalComments').value = req.adminComments || '';
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('detailModal').style.display = 'none';
            currentRequestId = null;
        }

        function saveDecision() {
            if (!currentRequestId) return;

            var status = document.getElementById('modalStatus').value;
            var comments = document.getElementById('modalComments').value.trim();

            apiPut('/api/requests/' + currentRequestId, { status: status, adminComments: comments }, function(err, resp, httpStatus) {
                if (httpStatus === 200 && resp.success) {
                    var msgDiv = document.getElementById('modalMessage');
                    msgDiv.textContent = 'Decision saved successfully!';
                    msgDiv.className = 'message success';
                    setTimeout(function() {
                        msgDiv.textContent = '';
                        msgDiv.className = 'message';
                        closeModal();
                        loadAdminDashboard();
                    }, 1500);
                }
            });
        }

        function downloadCSV() {
            var requests = getRequests();
            var csvContent = 'id,teamName,email,description,justification,status,adminComments,submittedDate\n';
            requests.forEach(function(r) {
                csvContent += '"' + r.id + '","' + r.teamName + '","' + r.email + '","' +
                    r.description.replace(/"/g, '""') + '","' + r.justification.replace(/"/g, '""') + '","' +
                    r.status + '","' + (r.adminComments || '').replace(/"/g, '""') + '","' + r.submittedDate + '"\n';
            });

            var blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'requests_' + new Date().toISOString().split('T')[0] + '.csv';
            link.click();
        }
    </script>
</body>
</html>
